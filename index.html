<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        :root {
            --soft-pink: #ffdae0;
            --deep-pink: #ff85a1;
            --gradient: linear-gradient(45deg, #ff85a1, #fd79a8);
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--soft-pink);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Floating Hearts Background */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            animation: float 6s linear infinite;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
            z-index: 10;
            max-width: 90%;
            width: 400px;
        }

        .teddy-bear {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            color: #d63031;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #yesBtn {
            background: var(--gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 133, 161, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 133, 161, 0.6);
        }

        #noBtn {
            background: #fff;
            color: #999;
            border: 2px solid #eee;
            position: absolute;
        }

        /* Success Message Styling */
        #message {
            display: none;
            color: #ff4757;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 20px;
            animation: fadeIn 0.8s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="teddy-bear">🧸</div>
        <h1 id="question">WASH KATBGHINI?</h1>
        
        <div class="buttons" id="btnContainer">
            <button id="yesBtn">AH</button>
            <button id="noBtn">LA</button>
        </div>

        <div id="message">ANA TBNBGHIK BZZEF! ❤️</div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const message = document.getElementById('message');
        const question = document.getElementById('question');
        const btnContainer = document.getElementById('btnContainer');

        // Initial position for NO button
        noBtn.style.left = "160px";

        // "LA" button moves away on hover
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // "AH" button interaction
        yesBtn.addEventListener('click', () => {
            btnContainer.style.display = 'none';
            question.style.display = 'none';
            message.style.display = 'block';
            createBurst();
        });

        // Floating Hearts Background Logic
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 300);

        function createBurst() {
            for(let i=0; i<30; i++) {
                setTimeout(createHeart, i * 50);
            }
        }
    </script>
</body>
</html>
